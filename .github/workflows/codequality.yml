name: CodeQuality

on:
  push:
  pull_request:

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  ruff-mypy:
    name: Ruff and mypy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy projecto

  pytest:
    name: Pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: projecto_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: testing
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/projecto_test
      SECRET_KEY: test-secret-key-with-at-least-32-characters
      STORAGE_PATH: /tmp/projecto-storage

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest --junitxml=pytest-results.xml

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Pytest results
          path: pytest-results.xml
          reporter: java-junit
          fail-on-error: false

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - ruff-mypy
      - pytest
    if: github.event_name == 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: projecto:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
