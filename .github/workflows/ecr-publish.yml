name: Docker Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish, for example v1.2.3"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish image
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || startsWith(inputs.version, 'v')

    env:
      AWS_REGION: eu-central-1
      IMAGE_VERSION: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2.1.6

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ vars.ECR_REPOSITORY_URL }}
          tags: |
            type=raw,value=${{ env.IMAGE_VERSION }}

      - name: Build and push image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
