name: CodeQuality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ruff-mypy:
    name: Ruff and mypy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy projecto
